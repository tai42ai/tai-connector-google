name: Bug report
description: Report a defect in tai42-connector-google (the Google OAuth connector descriptor — pure data, no logic)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code that reproduce the problem (e.g. an import that fails, a descriptor that won't validate, a wrong scope / OAuth endpoint / env-var name).
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tai42-connector-google version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and the tai42-contract version in use.
      placeholder: "Python 3.13.x, macOS 15, tai42-contract 0.1.x"
    validations:
      required: true
